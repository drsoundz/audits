[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
    "lib/openzeppelin-contracts/contracts/=lib/openzeppelin-contracts/contracts/",
    "lib/forge-std/src/=lib/forge-std/src/"
]

